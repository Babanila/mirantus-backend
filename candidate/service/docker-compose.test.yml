version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: screening-orders-test-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: screening_orders_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d screening_orders_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-test-data:/var/lib/postgresql/data

volumes:
  postgres-test-data:
