version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: ${NODE_ENV}
    container_name: screening-orders-api
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      DATABASE_URL:           postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-screening_orders}?sslmode=disable
      NODE_ENV:               ${NODE_ENV:-development}
      LOG_LEVEL:              ${LOG_LEVEL:-debug}
      API_PORT:               ${API_PORT:-3000}
      CORS_ORIGIN:            ${CORS_ORIGIN:-http://localhost:5173}
      DB_POOL_MAX:            ${DB_POOL_MAX:-10}
      DB_POOL_MIN:            ${DB_POOL_MIN:-2}
      DB_CONNECT_TIMEOUT_MS:  ${DB_CONNECT_TIMEOUT_MS:-5000}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        echo '✅ Database ready. Running migrations...' &&
        node -e \"
          const ds = require(\'./dist/database/datasource.runtime\').default;
          ds.initialize()
            .then(() => ds.runMigrations({ transaction: 'all' }))
            .then(() => ds.destroy())
            .catch(async (err) => {
              console.error(err);
              if (ds.isInitialized) await ds.destroy();
              process.exit(1);
            });
        \" &&
        echo '🚀 Starting application...' &&
        node dist/main.js
      "
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: screening-orders-db
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 2s
      retries: 15
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
    name: screening_orders_pgdata
