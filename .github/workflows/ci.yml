name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    name: Build • Lint • Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: candidate/service

    # PostgreSQL service container with explicit health checks
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: screening_orders_test
        options: >-
          --health-cmd "pg_isready -U user -d screening_orders_test"
          --health-interval 3s
          --health-timeout 2s
          --health-retries 20
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/screening_orders_test?sslmode=disable
      NODE_ENV: test
      LOG_LEVEL: error
      CORS_ORIGIN: http://localhost:3000
      API_PORT:               3001
      DB_POOL_MAX:            10
      DB_POOL_MIN:            5
      DB_CONNECT_TIMEOUT_MS:  5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: candidate/service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build application
        run: npm run build

      - name: Run database migrations
        run: npm run migration:run
      
      - name: Verify migration
        run: npm run migration:show

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration
        timeout-minutes: 10
        env:
          # UV_THREADPOOL_SIZE controls libuv threads — more threads handle
          # concurrent HTTP connections more reliably on CI runners
          UV_THREADPOOL_SIZE: 16
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          directory: candidate/service/coverage
          flags: unittests
          fail_ci_if_error: false
